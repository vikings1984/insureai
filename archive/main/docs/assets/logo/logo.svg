<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ga" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <!-- 精炼版 A: 加大中心六边形，增强对比度，更多节点 -->
  <g fill="none" stroke="url(#ga)" stroke-linecap="round" stroke-linejoin="round">
    <!-- 中心六边形（加粗，作为视觉焦点） -->
    <polygon points="50,20 76,35 76,65 50,80 24,65 24,35" stroke-width="3.5"/>
    <!-- 上六边形 -->
    <polygon points="50,4 76,19 76,49 50,64 24,49 24,19" stroke-width="1.6" opacity="0.45"/>
    <!-- 左下六边形 -->
    <polygon points="24,51 50,36 50,64 24,79 0,65 0,35" stroke-width="1.6" opacity="0.45"/>
    <!-- 右下六边形 -->
    <polygon points="76,51 100,36 100,64 76,79 50,64 50,36" stroke-width="1.6" opacity="0.45"/>
  </g>
  <!-- 中心核心三角形（加大） -->
  <polygon points="50,33 64,57 36,57" fill="url(#ga)"/>
  <!-- 附加节点：六边形顶点上的小圆点 -->
  <g fill="url(#ga)">
    <circle cx="50" cy="20" r="2.5"/>
    <circle cx="76" cy="35" r="2.5"/>
    <circle cx="76" cy="65" r="2.5"/>
    <circle cx="50" cy="80" r="2.5"/>
    <circle cx="24" cy="65" r="2.5"/>
    <circle cx="24" cy="35" r="2.5"/>
  </g>
</svg>