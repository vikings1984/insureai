name: Daily Insurance News Collect

# 重要：GitHub 的 schedule 定时任务只在仓库【默认分支(main)】上生效，故本文件须提交到 main。
# 任务内部切换到 insurescope 分支执行采集；提交 data.json 后，把 index.html 的 data-url
# 刷新为最新提交 SHA（jsDelivr 对 SHA 引用即时生效、无分支缓存延迟），并 purge 该 SHA 的 CDN，
# 使任何拉取该 index.html 的预览自动获得最新数据。
#
# 预览宿主：GitHub Pages（源 = insurescope 分支根目录）。本工作流 push 到 insurescope 会
# 自动触发 Pages 重新部署 —— 实现"零接触自动刷新"，无需手动重新部署任何静态托管。
on:
  schedule:
    - cron: '0 0 * * *'        # 每日 UTC 00:00 = 北京时间 08:00
  workflow_dispatch:           # 支持手动触发

permissions:
  contents: write

env:
  SITE_URL: "https://vikings1984.github.io/insureai"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout insurescope branch
        uses: actions/checkout@v4
        with:
          ref: insurescope
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run collector
        run: python3 collect.py

      - name: Prerender SEO (site = GitHub Pages)
        run: python3 prerender.py --site-url "$SITE_URL"

      - name: Commit data + SEO
        run: |
          git config user.name "insurescope-bot"
          git config user.email "bot@insurescope.local"
          if [ -n "$(git status --porcelain data.json index.html sitemap.xml)" ]; then
            git add data.json index.html sitemap.xml
            git commit -m "chore: auto-collect + prerender $(date +%F)"
          else
            echo "no changes to data.json"
          fi

      - name: Pin data-url to latest commit SHA
        run: |
          git config user.name "insurescope-bot"
          git config user.email "bot@insurescope.local"
          SHA=$(git rev-parse HEAD)
          sed -i -E "s#(gh/vikings1984/insureai@)[^\"/]+?(/data.json)#\1${SHA}\2#" index.html
          if [ -n "$(git status --porcelain index.html)" ]; then
            git add index.html
            git commit -m "chore: pin data-url to ${SHA}"
          else
            echo "data-url 已是最新 SHA"
          fi

      - name: Push (triggers GitHub Pages redeploy)
        run: git push origin insurescope

      - name: Purge jsDelivr cache
        run: |
          SHA=$(git rev-parse HEAD)
          curl -s -X GET "https://purge.jsdelivr.net/gh/vikings1984/insureai@${SHA}/data.json" || true
          curl -s -X GET "https://gcore.jsdelivr.net/gh/vikings1984/insureai@${SHA}/data.json?purge=true" || true
