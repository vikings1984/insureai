name: Daily Insurance News Collect

# 单分支架构：insureai 既是默认分支也是唯一应用分支。
# 流程：采集 → prerender(SEO) → 提交 data.json(+SEO) → push。
# data-url 指向同源 data.json（GitHub Pages 每次 push 自动重部署，数据即最新），
# 无需 jsDelivr CDN / SHA pin / purge —— 少三个脆弱环节，零接触刷新不变。
on:
  schedule:
    - cron: '0 0 * * *'        # 每日 UTC 00:00 = 北京时间 08:00
  workflow_dispatch:           # 支持手动触发

permissions:
  contents: write

env:
  SITE_URL: "https://vikings1984.github.io/insureai"

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (default = insureai)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run collector
        run: python3 collect.py

      - name: Prerender SEO (site = GitHub Pages)
        run: python3 prerender.py --site-url "$SITE_URL"

      - name: Commit data + SEO
        run: |
          git config user.name "insureai-bot"
          git config user.email "bot@insureai.local"
          if [ -n "$(git status --porcelain data.json index.html sitemap.xml research.json)" ]; then
            git add data.json index.html sitemap.xml research.json
            git commit -m "chore: auto-collect + prerender $(date +%F)"
          else
            echo "no changes"
          fi

      - name: Push (triggers GitHub Pages redeploy)
        run: git push origin HEAD:${{ github.ref_name }}
