name: Daily Auto Update

on:
  # 每天北京时间 8:00 运行
  schedule:
    - cron: '0 0 * * *'

  # 支持手动触发
  workflow_dispatch:
    inputs:
      date:
        description: '指定日期 (YYYY-MM-DD)，留空为今天'
        required: false
        default: ''

# 需要写入权限（提交和推送）
permissions:
  contents: write

jobs:
  collect-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser httpx

      - name: Run collection
        run: python run_collect.py

      - name: Commit and push
        run: |
          git config user.name "InsureAI Bot"
          git config user.email "bot@insureai.dev"
          git add data/summaries/ docs/_posts/ docs/data.json
          git diff --staged --quiet || git commit -m "📊 Daily update: $(date +%Y-%m-%d)"
          git push