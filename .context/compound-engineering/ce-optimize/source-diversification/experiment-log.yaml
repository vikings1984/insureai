spec:
  name: source-diversification
  description: 扩大信息采集渠道，接入搜索引擎、微信公众号、头条等新数据源
  primary_metric: channel_comprehensiveness
  direction: maximize
  target: 4.0

run_id: "2026-07-02T10:00:00+08:00"
started_at: "2026-07-02T10:00:00+08:00"
completed_at: "2026-07-02T12:30:00+08:00"

baseline:
  timestamp: "2026-07-02T10:00:00+08:00"
  gates:
    total_items: 12
    category_diversity: 5
    source_diversity: 8
    stock_noise_count: 0
  gate_failures:
    - "total_items: 12 < 15"
    - "source_diversity: 8 < 10"
  judge_scores:
    channel_comprehensiveness: 2
    distinct_channels: 1
    new_channel_items: 0
  judge_notes: 所有内容仅来自东方财富API一个渠道

# ===== Batch 1: 初始渠道扩展 (Exp 1-4) =====

experiments:
  - iteration: 1
    hypothesis: "同时接入百度新闻搜索+今日头条搜索+搜狗微信公众号搜索"
    category: signal-extraction
    outcome: kept
    gates: {total_items: 30, category_diversity: 5, source_diversity: 19, stock_noise_count: 0}
    judge_scores: {channel_comprehensiveness: 3, distinct_channels: 3, new_channel_items: 25}
    improvement: 1.0
    learnings: |
      百度22条(成功)，搜狗微信8条(成功)，头条0条(失败)。
      渠道1→3种，source_diversity 8→19。但百度返回非新闻内容(知乎/百科)，
      微信文章无日期默认今天，头条需JS渲染无法工作。

  - iteration: 2
    hypothesis: "百度质量黑名单过滤+渠道均衡限制+保留三渠道"
    category: signal-extraction
    outcome: reverted
    gates: {total_items: 20, category_diversity: 5, source_diversity: 9, stock_noise_count: 0}
    gate_failures: ["source_diversity: 9 < 10"]
    judge_scores: {channel_comprehensiveness: 2, distinct_channels: 2, new_channel_items: 8}
    improvement: -1.0
    learnings: |
      百度反爬不稳定(22→0条)。黑名单过滤生效(0条泄漏)。
      搜狗微信稳定8条。头条持续失败。source_diversity波动大。

  - iteration: 3
    hypothesis: "百度重试(桌面+移动UA)+搜狗微信扩展6关键词+微信日期解析"
    category: signal-extraction
    outcome: reverted
    gates: {total_items: 27, category_diversity: 5, source_diversity: 9, stock_noise_count: 0}
    gate_failures: ["source_diversity: 9 < 10"]
    judge_scores: {channel_comprehensiveness: 2, distinct_channels: 2, new_channel_items: 15}
    improvement: -1.0
    learnings: |
      百度重试仍失败(桌面+移动UA均被拦截)。搜狗微信扩展至6关键词，采集量8→24(入final 15)。
      但所有微信文章source_name="微信公众号"导致source_diversity仅9。
      日期解析未生效(s2 class内为JavaScript timeConvert调用)。

  - iteration: 4
    hypothesis: "微信账号名提取(all-time-y2)+Unix时间戳日期转换"
    category: signal-extraction
    outcome: kept
    gates: {total_items: 18, category_diversity: 5, source_diversity: 14, stock_noise_count: 0}
    judge_scores: {channel_comprehensiveness: 3, distinct_channels: 2, new_channel_items: 6}
    improvement: 0.0
    learnings: |
      账号名提取成功：6个不同公众号(中邮保险/金融安阳/维赛特资讯等)。
      Unix时间戳日期转换成功(2026-07-02)。source_diversity 9→14，门控通过。
      百度仍不稳定但系统不依赖百度也能通过门控。
      微信来源质量参差(个人号与机构号混合)。

  # ===== Batch 2: 新搜索引擎+质量增强 (Exp 5-7) =====

  - iteration: 5
    hypothesis: "接入Google News RSS+Bing News+改进渠道均衡(MIN_PER_TYPE=3)"
    category: signal-extraction
    outcome: kept
    gates: {total_items: 30, category_diversity: 5, source_diversity: 24, stock_noise_count: 0}
    judge_scores: {channel_comprehensiveness: 3, distinct_channels: 5, new_channel_items: 2}
    improvement: 0.0
    learnings: |
      Google News RSS连接超时(本环境无法访问Google)。
      Bing News返回首页(JS渲染,无搜索结果)。
      渠道均衡MIN_PER_TYPE=3概念正确，但item in balanced用字典相等性导致误判。
      Baidu今天可用(31条)，source_diversity达24。

  - iteration: 6
    hypothesis: "替换Bing为360搜索+搜狗新闻搜索（国内可用搜索引擎）"
    category: signal-extraction
    outcome: kept
    gates: {total_items: 30, category_diversity: 5, source_diversity: 15, stock_noise_count: 0}
    judge_scores: {channel_comprehensiveness: 4, distinct_channels: 4, new_channel_items: 18}
    improvement: 1.0
    learnings: |
      360搜索稳定可用(24条/3关键词)，返回真实新闻标题。
      搜狗新闻搜索间歇可用(0-12条)，域名提取来源名需优化。
      移除头条搜索代码(持续失败)，移除Bing(JS渲染不可用)。
      保留Google News RSS代码(GitHub Actions CI环境可能可用)。

  - iteration: 7
    hypothesis: "搜索引擎噪声过滤+微信低质号过滤+渠道均衡id()修复+保险公司官网黑名单"
    category: signal-extraction
    outcome: kept
    gates: {total_items: 25, category_diversity: 5, source_diversity: 12, stock_noise_count: 0}
    judge_scores: {channel_comprehensiveness: 4, distinct_channels: 3, new_channel_items: 18}
    improvement: 0.0
    learnings: |
      搜索引擎噪声过滤(SEARCH_ENGINE_NOISE_PATTERNS)成功过滤产品页/Q&A/SEO垃圾。
      微信低质号过滤(WECHAT_LOW_QUALITY_MARKERS)移除社区号/个人随笔号。
      渠道均衡id()修复：字典相等性导致不同文章被误判为重复，改用id()跟踪。
      TARGET_TOTAL=30修复：第二轮不再无限制添加，防止低分项被截断后丢失多样性。
      保险公司官网(picc.com.cn/pingan.com等)加入黑名单，过滤产品页。
      精选阈值6.0过滤掉低分iachina/微信文章，最终25条(非30条)。

