best:
  iteration: 6
  hypothesis: "360搜索+搜狗新闻替代Bing/Google+渠道均衡id()修复+噪声过滤"
  outcome: kept
  gates: {total_items: 25-30, category_diversity: 5, source_diversity: 12-24, stock_noise_count: 0}
  judge_scores: {channel_comprehensiveness: 4, distinct_channels: 3-4, new_channel_items: 18}
  improvement: 2.0
  target_met: true
  notes: |
    最终配置合并了Batch1和Batch2所有改进：
    - 360搜索(可靠新渠道，24条/次)
    - 搜狗新闻搜索(间歇可用)
    - Google News RSS(保留代码，CI环境可能可用)
    - 百度新闻(不稳定，可用时贡献大)
    - 搜狗微信公众号(稳定，含账号名+时间戳)
    - 搜索引擎噪声过滤(产品页/Q&A/SEO垃圾)
    - 微信低质号过滤(社区号/个人随笔号)
    - 渠道均衡(id()修复+TARGET_TOTAL=30)
    - 保险公司官网黑名单
    channel_comprehensiveness=4达到target=4.0。
    3种平台类型(财经媒体/搜索引擎/微信公众号)，5个工作渠道，12-24个来源。

